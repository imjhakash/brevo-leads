name: Send Plain Test Email

on:
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Send plain test email (no template)
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
        run: python3 send_plain_test.py

name: Send Test Email

on:
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Send test email to Helloatjh@gmail.com
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
        run: python3 send_test_email.py

name: Create Brevo Templates (One-Time)

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  create:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create templates in all Brevo accounts
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          BREVO_API_KEY_2: ${{ secrets.BREVO_API_KEY_2 }}
          BREVO_API_KEY_3: ${{ secrets.BREVO_API_KEY_3 }}
          BREVO_API_KEY_4: ${{ secrets.BREVO_API_KEY_4 }}
          BREVO_API_KEY_5: ${{ secrets.BREVO_API_KEY_5 }}
        run: python3 create_templates.py

      - name: Commit template IDs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add template_ids.json || true
          git diff --cached --quiet || git commit -m "Add Brevo template IDs"
          git push

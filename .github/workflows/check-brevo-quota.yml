name: Check Brevo Daily Quota

on:
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check Brevo daily quota
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
        run: python3 check_brevo_quota.py

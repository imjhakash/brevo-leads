name: Verify Brevo API Key

on:
  workflow_dispatch: {}

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify Brevo API key
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
        run: python3 verify_brevo_key.py
